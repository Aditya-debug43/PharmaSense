<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSense Logo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-blue: #164b5e;
            --light-green: #68c090;
            --dark-green: #378b61;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 50px 70px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(22, 75, 94, 0.1);
        }

        .logo-icon {
            width: 140px;
            height: 140px;
            margin-bottom: 24px;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            color: var(--dark-blue);
        }

        .logo-text span {
            color: var(--dark-green);
            font-weight: 700;
        }

        .separator {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--dark-blue) 0%, var(--dark-green) 100%);
            margin: 12px 0;
            border-radius: 3px;
        }

        .logo-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--dark-blue);
            text-transform: uppercase;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            
            <path d="M 32 12 H 68 V 32 H 88 V 68 H 68 V 88 H 32 V 68 H 12 V 32 H 32 Z" 
                  fill="none" 
                  stroke="#164b5e" 
                  stroke-width="5" 
                  stroke-linejoin="round"/>

            <line x1="50" y1="26" x2="50" y2="70" 
                  stroke="#164b5e" 
                  stroke-width="3" 
                  stroke-linecap="round" />
            <circle cx="50" cy="24" r="2.5" fill="#164b5e" />

            <line x1="50" y1="55" x2="62" y2="38" 
                  stroke="#378b61" 
                  stroke-width="5" 
                  stroke-linecap="round" />

            <path d="M 50 64 C 36 64, 36 52, 50 52" 
                  fill="none" stroke="#164b5e" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 50 52 C 64 52, 64 40, 50 40" 
                  fill="none" stroke="#164b5e" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 50 40 C 44 40, 41 35, 43 31" 
                  fill="none" stroke="#164b5e" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 42 32 C 40 30, 43 27, 45 28 C 47 29, 46 31, 42 32 Z" fill="#164b5e"/>

            <path d="M 34 53 C 34 72, 42 75, 50 75 C 58 75, 66 72, 66 53 Z" fill="#68c090" />
            <ellipse cx="50" cy="53" rx="16" ry="4" fill="#378b61" />
            <path d="M 44 75 L 41 80 H 59 L 56 75 Z" fill="#68c090" />
            <ellipse cx="50" cy="80" rx="9" ry="2" fill="#378b61" />

        </svg>

        <h1 class="logo-text">Pharma<span>Sense</span></h1>
        <div class="separator"></div>
        <p class="logo-subtext">Quality Medicines & Care</p>
    </div>

</body>
</html>
